<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Shield background -->
  <rect width="100" height="100" fill="#1a1a2e" rx="10"/>
  
  <!-- Sword -->
  <line x1="50" y1="20" x2="50" y2="80" stroke="#e94560" stroke-width="6" stroke-linecap="round"/>
  <line x1="35" y1="35" x2="65" y2="35" stroke="#ffd700" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Center gem -->
  <circle cx="50" cy="35" r="8" fill="#0f3460"/>
  
  <!-- Text hint -->
  <text x="50" y="90" font-size="8" fill="#ffd700" text-anchor="middle" font-family="monospace">SQ</text>
</svg>
